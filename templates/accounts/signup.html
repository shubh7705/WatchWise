{% extends "base.html" %}

{% block title %}Sign Up | WatchWise{% endblock %}

{% block content %}
<div class="auth-wrapper">
  <div class="glass-panel auth-card animate-fade-in" style="max-width: 500px;">
    <div style="margin-bottom: 20px;">
      <i class="fa-solid fa-user-plus fa-4x" style="color: var(--accent);"></i>
    </div>
    <h2 class="title-glow">Create Account</h2>

    <form method="post" style="text-align: left;">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 20px; padding: 12px;">
        <i class="fa-solid fa-user-check"></i> Register
      </button>
    </form>

    <p style="text-align:center; margin-top: 25px; color: var(--text-secondary);">
      Already have an account?
      <a href="{% url 'login' %}" style="font-weight: 600;">Login</a>
    </p>
  </div>
</div>
{% endblock %}
