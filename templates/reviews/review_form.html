{% extends "base.html" %}

{% block title %}Review {{ movie.title }} | WatchWise{% endblock %}

{% block content %}
<div class="glass-panel animate-fade-in" style="max-width: 700px; margin: 50px auto; padding: 40px;">

  <div style="text-align: center; margin-bottom: 30px;">
    <h2 class="title-glow"><i class="fa-solid fa-star" style="color: #f59e0b;"></i> Review: {{ movie.title }}</h2>
  </div>

  <form method="post">
    {% csrf_token %}

    <div class="input-group">
      <label for="rating">Your Rating <span style="color: var(--danger);">*</span></label>
      <select name="rating" id="rating" class="modern-input" required>
        <option value="">-- Select Rating --</option>
        {% for value, label in rating_choices %}
          <option value="{{ value }}"
            {% if review and review.rating == value %}selected{% endif %}>
            {{ label }}
          </option>
        {% endfor %}
      </select>
    </div>

    <div class="input-group">
      <label for="review_text">Your Thoughts</label>
      <textarea
        name="review_text"
        id="review_text"
        class="modern-input"
        placeholder="Share your thoughts about the movie..."
        style="min-height: 150px;"
      >{{ review.review_text|default_if_none:'' }}</textarea>
    </div>

    <div style="display: flex; gap: 15px; margin-top: 30px;">
      <button type="submit" class="btn btn-primary" style="flex: 1;">
        {% if review %}
          <i class="fa-solid fa-pen-to-square"></i> Update Review
        {% else %}
          <i class="fa-solid fa-paper-plane"></i> Submit Review
        {% endif %}
      </button>
      
      <a href="{% url 'movies:detail' movie.id %}" class="btn btn-secondary" style="flex: 1; text-align: center;">
        Cancel
      </a>
    </div>
  </form>

</div>
{% endblock %}
