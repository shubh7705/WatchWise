{% extends "base.html" %}

{% block title %}Create Club | WatchWise{% endblock %}

{% block content %}
<div class="glass-panel animate-fade-in" style="max-width: 600px; margin: 50px auto; padding: 40px;">

  <div style="text-align: center; margin-bottom: 30px;">
    <h2 class="title-glow"><i class="fa-solid fa-users"></i> Create a New Club</h2>
    <p style="color: var(--text-secondary);">Start a new community discussion group.</p>
  </div>

  <form method="post">
    {% csrf_token %}

    <div class="input-group">
      <label>Club Name <span style="color: var(--danger);">*</span></label>
      <input type="text" name="name" class="modern-input" placeholder="e.g. Scifi Fanatics" required>
    </div>

    <div class="input-group">
      <label>Description</label>
      <textarea name="description" class="modern-input" style="min-height: 120px;" placeholder="What is this club about?"></textarea>
    </div>

    <div style="display: flex; gap: 15px; flex-wrap: wrap; margin-top: 30px;">
      <button type="submit" class="btn btn-primary" style="flex: 1;">
        <i class="fa-solid fa-plus-circle"></i> Create Club
      </button>
      <a href="{% url 'groups:list' %}" class="btn btn-secondary" style="flex: 1; text-align: center;">
        Cancel
      </a>
    </div>
  </form>

</div>
{% endblock %}
