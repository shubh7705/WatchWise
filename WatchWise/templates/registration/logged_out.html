{% extends "base.html" %}

{% block title %}Logged Out | WatchWise{% endblock %}

{% block content %}
<div class="auth-wrapper">
  <div class="glass-panel auth-card animate-fade-in" style="max-width: 500px; padding: 40px;">
    <div style="margin-bottom: 20px;">
      <i class="fa-solid fa-right-from-bracket fa-4x" style="color: var(--text-muted);"></i>
    </div>
    <h2 class="title-glow">You have been logged out</h2>
    <p style="color: var(--text-secondary); margin-bottom: 25px;">You have successfully logged out of your account.</p>

    <div style="display: flex; gap: 15px; justify-content: center; flex-wrap: wrap;">
      <a href="{% url 'login' %}" class="btn btn-primary">
        <i class="fa-solid fa-right-to-bracket"></i> Login Again
      </a>
      <a href="{% url 'movies:list' %}" class="btn btn-secondary">
        <i class="fa-solid fa-home"></i> Go to Movies
      </a>
    </div>
  </div>
</div>
{% endblock %}
