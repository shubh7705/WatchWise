{% extends "base.html" %}

{% block title %}Add Movie | WatchWise{% endblock %}

{% block content %}
<div class="glass-panel animate-fade-in" style="max-width: 800px; margin: 40px auto; padding: 40px;">
  
  <div style="text-align: center; margin-bottom: 30px;">
    <h2 class="title-glow"><i class="fa-solid fa-film"></i> Add New Movie</h2>
    <p style="color: var(--text-secondary);">Add a new movie to the WatchWise database manually or autofill from TMDB.</p>
  </div>

  <form method="post">
    {% csrf_token %}

    <div class="input-group">
      <label>Title <span style="color: var(--danger);">*</span></label>
      <div style="display: flex; gap: 10px;">
        <input type="text" id="title" name="title" class="modern-input" required>
        <button type="button" class="btn btn-secondary" onclick="autofillMovie()" style="white-space: nowrap;">
          <i class="fa-solid fa-robot" style="color: #f5c518;"></i> Auto-Fill
        </button>
      </div>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
      <div class="input-group">
        <label>Release Year <span style="color: var(--danger);">*</span></label>
        <input type="number" id="release_year" name="release_year" class="modern-input" required>
      </div>

      <div class="input-group">
        <label>Duration (minutes) <span style="color: var(--danger);">*</span></label>
        <input type="number" id="duration" name="duration" class="modern-input" required>
      </div>
    </div>

    <div class="input-group">
      <label>Overview</label>
      <textarea id="overview" name="overview" class="modern-input" style="min-height: 100px;"></textarea>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
      <div class="input-group">
        <label>Language</label>
        <input type="text" id="language" name="language" class="modern-input">
      </div>

      <div class="input-group">
        <label>Poster URL</label>
        <input type="text" id="poster" name="poster" class="modern-input" placeholder="https://...">
      </div>
    </div>

    <div class="input-group">
      <label>Genres</label>
      <div style="display: flex; flex-wrap: wrap; gap: 15px; margin-top: 10px; padding: 15px; background: var(--bg-primary); border-radius: 12px; border: 1px solid var(--border);">
        {% for genre in genres %}
          <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; color: var(--text-primary); font-weight: 500;">
            <input
              type="checkbox"
              name="genres"
              value="{{ genre.tmdb_id }}"
              class="genre-checkbox"
              style="width: 18px; height: 18px; accent-color: var(--accent);"
            >
            {{ genre.name }}
          </label>
        {% endfor %}
      </div>
    </div>

    <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 20px; padding: 14px; font-size: 16px;">
      <i class="fa-solid fa-plus-circle"></i> Add Movie to Database
    </button>
  </form>

</div>

<script>
function autofillMovie() {
  const title = document.getElementById("title").value;
  const year = document.getElementById("release_year").value;
  const btn = document.querySelector('.btn-secondary');

  if (!title) {
    alert("Please enter title to autofill.");
    return;
  }
  
  const originalHtml = btn.innerHTML;
  btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Searching...';

  fetch(`/movies/autofill/?title=${encodeURIComponent(title)}&year=${year}`)
    .then(res => res.json())
    .then(data => {
      btn.innerHTML = originalHtml;
      
      if (data.error) {
        alert(data.error);
        return;
      }

      document.getElementById("overview").value = data.overview || "";
      document.getElementById("release_year").value = data.release_year || "";
      document.getElementById("language").value = data.language || "";
      document.getElementById("duration").value = data.runtime || "";
      document.getElementById("poster").value = data.poster || "";

      if (Array.isArray(data.genre_ids)) {
        const genreIds = data.genre_ids.map(Number);

        document.querySelectorAll(".genre-checkbox").forEach(cb => {
          cb.checked = genreIds.includes(Number(cb.value));
        });
      }
    })
    .catch(err => {
      btn.innerHTML = originalHtml;
      console.error(err);
      alert("Failed to fetch movie data");
    });
}
</script>
{% endblock %}
