{% extends "base.html" %}

{% block title %}Login | WatchWise{% endblock %}

{% block content %}
<div class="auth-wrapper">
  <div class="glass-panel auth-card animate-fade-in">
    <div style="margin-bottom: 20px;">
      <i class="fa-solid fa-user-circle fa-4x" style="color: var(--accent);"></i>
    </div>
    <h2 class="title-glow">Welcome Back</h2>

    {% if form.errors %}
      <div style="background: rgba(239, 68, 68, 0.1); color: var(--danger); padding: 10px; border-radius: 8px; margin-bottom: 20px; text-align: left;">
        <i class="fa-solid fa-triangle-exclamation"></i> Invalid username or password
      </div>
    {% endif %}

    <form method="post" style="text-align: left;">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 20px; padding: 12px;">
        <i class="fa-solid fa-right-to-bracket"></i> Login
      </button>
    </form>

    <p style="text-align:center; margin-top: 25px; color: var(--text-secondary);">
      Don’t have an account?
      <a href="{% url 'accounts:signup' %}" style="font-weight: 600;">Sign up</a>
    </p>
  </div>
</div>
{% endblock %}
